name: Production
"on":
  workflow_dispatch: {}
  push:
    branches:
      - production

env:
  CI: ""

# Required for GitHub Pages OIDC deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel in-flight deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

  migrate:
    name: "Migrate Database"
    runs-on: ubuntu-latest
    needs: [prepare]
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push unpublished migrations
        run: supabase db push --db-url ${{ secrets.SUPABASE_CONNECTION_STRING }}

  build:
    name: "Build"
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Determines the Pages base URL and sets GITHUB_PAGES=true so Vite
      # can pick it up. If you use a custom domain set base: '/' in vite.config.ts;
      # otherwise add base: '/relay/' (matching your repo name) or pass
      # --base=/relay/ to the build command below.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_DB_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_GIT_COMMIT: ${{ needs.prepare.outputs.short_sha }}
          VITE_ENV: "production"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: "Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  cleanup-artifact:
    name: "Cleanup Artifacts"
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - uses: actions/checkout@v4
      - name: Delete Pages artifact
        uses: geekyeggo/delete-artifact@v5
        with:
          name: github-pages
